<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga - Giliran Bot Alpha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .header p {
            color: #aaa;
            font-size: 14px;
            margin-top: 4px;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
        }
        .status-box .turn-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-box .turn-name {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-top: 2px;
        }
        .status-box .turn-name .highlight-player {
            color: #4fc3f7;
        }
        .status-box .turn-name .highlight-bot {
            color: #ff8a65;
        }
        .status-box .dice-result {
            color: #ffd700;
            font-size: 14px;
            margin-top: 6px;
        }
        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px 16px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .player-card.active {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .player-card .name {
            font-weight: 600;
            font-size: 14px;
        }
        .player-card .name.player {
            color: #4fc3f7;
        }
        .player-card .name.bot {
            color: #ff8a65;
        }
        .player-card .position {
            color: #aaa;
            font-size: 12px;
            margin-top: 4px;
        }
        .player-card .position span {
            color: #fff;
            font-weight: 700;
        }
        .dice-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .dice {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: 800;
            color: #1a1a2e;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }
        .dice.rolling {
            animation: roll 0.5s ease;
        }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(0.9); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .btn-roll {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 18px;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }
        .btn-roll:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.4);
        }
        .btn-roll:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-roll:active:not(:disabled) {
            transform: scale(0.95);
        }
        .log-area {
            margin-top: 20px;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
        }
        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        .log-item {
            color: #ccc;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .log-item .highlight {
            color: #ffd700;
            font-weight: 600;
        }
        .log-item .player-log {
            color: #4fc3f7;
        }
        .log-item .bot-log {
            color: #ff8a65;
        }
        .log-item .special {
            color: #ff6b6b;
            font-weight: 600;
        }
        .reset-area {
            text-align: center;
            margin-top: 14px;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .bot-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        .bot-tag {
            background: rgba(255, 138, 101, 0.2);
            color: #ff8a65;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .bot-tag.active-bot {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            border: 1px solid #ffd700;
        }
        @media (max-width: 480px) {
            .players-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px;
            }
            .dice {
                width: 60px;
                height: 60px;
                font-size: 32px;
            }
            .btn-roll {
                padding: 12px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>🎲 GILIRAN BOT</h1>
            <p>Bot Alpha · Player vs 3 Bot</p>
        </div>

        <!-- Status -->
        <div class="status-box">
            <div class="turn-label">🔄 Giliran Sekarang</div>
            <div class="turn-name" id="turnName">--</div>
            <div class="dice-result" id="diceResult">Klik tombol untuk mulai</div>
        </div>

        <!-- Player Cards -->
        <div class="players-grid">
            <div class="player-card" id="card-player">
                <div class="name player">🧑 Player</div>
                <div class="position">Posisi: <span id="pos-player">0</span></div>
            </div>
            <div class="player-card" id="card-bot1">
                <div class="name bot">🤖 Bot Alpha</div>
                <div class="position">Posisi: <span id="pos-bot1">0</span></div>
            </div>
            <div class="player-card" id="card-bot2">
                <div class="name bot">🤖 Bot Beta</div>
                <div class="position">Posisi: <span id="pos-bot2">0</span></div>
            </div>
            <div class="player-card" id="card-bot3">
                <div class="name bot">🤖 Bot Gamma</div>
                <div class="position">Posisi: <span id="pos-bot3">0</span></div>
            </div>
        </div>

        <!-- Bot Tags -->
        <div class="bot-list" id="botList"></div>

        <!-- Dice & Button -->
        <div class="dice-area">
            <div class="dice" id="dice">⚀</div>
            <button class="btn-roll" id="rollBtn">🎲 Lempar</button>
        </div>

        <!-- Log -->
        <div class="log-area" id="logArea">
            <div class="log-item">🎮 Selamat datang di Giliran Bot!</div>
        </div>

        <!-- Reset -->
        <div class="reset-area">
            <button class="btn-reset" id="resetBtn">↻ Reset Game</button>
        </div>
    </div>

    <script>
        // ============================
        // KONFIGURASI
        // ============================
        const BOT_NAMES = ['Bot Alpha', 'Bot Beta', 'Bot Gamma'];
        const BOT_IDS = ['bot1', 'bot2', 'bot3'];
        const MAX_POS = 760; // posisi maksimal

        // ============================
        // STATE
        // ============================
        let state = {
            players: {
                player: { id: 'player', name: 'Player', pos: 0, isBot: false },
                bot1: { id: 'bot1', name: 'Bot Alpha', pos: 0, isBot: true },
                bot2: { id: 'bot2', name: 'Bot Beta', pos: 0, isBot: true },
                bot3: { id: 'bot3', name: 'Bot Gamma', pos: 0, isBot: true },
            },
            turnOrder: ['player', 'bot1', 'bot2', 'bot3'],
            currentTurnIndex: 0,
            isRolling: false,
            gameOver: false,
            log: [],
            diceValue: 1,
            extraTurn: false, // flag untuk bonus giliran (angka 6)
        };

        // ============================
        // DOM REFS
        // ============================
        const $ = id => document.getElementById(id);
        const turnName = $('turnName');
        const diceResult = $('diceResult');
        const diceEl = $('dice');
        const rollBtn = $('rollBtn');
        const logArea = $('logArea');
        const resetBtn = $('resetBtn');
        const botList = $('botList');

        // posisi elemen
        const posEls = {
            player: $('pos-player'),
            bot1: $('pos-bot1'),
            bot2: $('pos-bot2'),
            bot3: $('pos-bot3'),
        };

        const cardEls = {
            player: $('card-player'),
            bot1: $('card-bot1'),
            bot2: $('card-bot2'),
            bot3: $('card-bot3'),
        };

        // ============================
        // FUNGSI BANTU
        // ============================
        function getDiceEmoji(val) {
            const map = { 1: '⚀', 2: '⚁', 3: '⚂', 4: '⚃', 5: '⚄', 6: '⚅' };
            return map[val] || '⚀';
        }

        function randomDice() {
            return Math.floor(Math.random() * 6) + 1;
        }

        function getCurrentPlayerId() {
            return state.turnOrder[state.currentTurnIndex];
        }

        function getCurrentPlayer() {
            return state.players[getCurrentPlayerId()];
        }

        function isCurrentPlayerHuman() {
            return getCurrentPlayerId() === 'player';
        }

        function updateUI() {
            // Update posisi
            for (const [id, el] of Object.entries(posEls)) {
                el.textContent = state.players[id].pos;
            }

            // Update highlight kartu
            const currentId = getCurrentPlayerId();
            for (const [id, el] of Object.entries(cardEls)) {
                el.classList.toggle('active', id === currentId);
            }

            // Update bot tags
            renderBotTags();

            // Update tombol
            const isPlayerTurn = isCurrentPlayerHuman() && !state.gameOver;
            rollBtn.disabled = !isPlayerTurn || state.isRolling;

            // Update status
            const player = getCurrentPlayer();
            const isBot = player.isBot;
            const nameDisplay = isBot ?
                `<span class="highlight-bot">${player.name}</span>` :
                `<span class="highlight-player">${player.name}</span>`;
            turnName.innerHTML = nameDisplay;

            if (state.gameOver) {
                const winner = Object.values(state.players).find(p => p.pos >= MAX_POS);
                if (winner) {
                    turnName.innerHTML = `🏆 <span style="color:#ffd700;">${winner.name} MENANG!</span>`;
                    diceResult.textContent = '🎉 Game selesai!';
                }
            } else if (state.extraTurn) {
                diceResult.textContent = '🎯 Bonus! Dapat angka 6, main lagi!';
            } else {
                diceResult.textContent = `Klik lempar untuk jalan`;
            }

            // Update dice
            diceEl.textContent = getDiceEmoji(state.diceValue);
        }

        function renderBotTags() {
            const currentId = getCurrentPlayerId();
            botList.innerHTML = BOT_IDS.map(id => {
                const bot = state.players[id];
                const isActive = id === currentId;
                return `<span class="bot-tag ${isActive ? 'active-bot' : ''}">${bot.name} (${bot.pos})</span>`;
            }).join('');
        }

        function addLog(message, type = 'normal') {
            const time = new Date().toLocaleTimeString();
            state.log.push({ message, type, time });
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<span style="color:#666;font-size:11px;">${time}</span> ${message}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
            // batasi log
            if (state.log.length > 100) {
                logArea.removeChild(logArea.firstChild);
                state.log.shift();
            }
        }

        function resetGame() {
            // Reset posisi
            for (const key of Object.keys(state.players)) {
                state.players[key].pos = 0;
            }
            state.currentTurnIndex = 0;
            state.isRolling = false;
            state.gameOver = false;
            state.extraTurn = false;
            state.diceValue = 1;
            state.log = [];
            logArea.innerHTML = '';
            addLog('🔄 Game di-reset! Mulai baru.');
            updateUI();
            rollBtn.disabled = false;
        }

        // ============================
        // INTI LOGIKA GAME
        // ============================
        function nextTurn() {
            if (state.gameOver) return;

            // Cek apakah current player dapat bonus (angka 6)
            if (state.extraTurn) {
                // Bonus: tetap di giliran yang sama
                state.extraTurn = false;
                // Tapi kalau yang dapat 6 adalah bot, kita jalanin otomatis
                const current = getCurrentPlayer();
                if (current.isBot) {
                    // Bot jalan lagi otomatis
                    setTimeout(() => {
                        if (!state.gameOver && !state.isRolling) {
                            executeBotTurn(current.id);
                        }
                    }, 600);
                }
                updateUI();
                return;
            }

            // Lanjut ke giliran berikutnya
            state.currentTurnIndex = (state.currentTurnIndex + 1) % state.turnOrder.length;

            // Jika giliran bot, jalankan otomatis
            const nextPlayer = getCurrentPlayer();
            if (nextPlayer.isBot && !state.gameOver) {
                setTimeout(() => {
                    if (!state.gameOver && !state.isRolling) {
                        executeBotTurn(nextPlayer.id);
                    }
                }, 500);
            }

            updateUI();
        }

        // Fungsi untuk menjalankan giliran (baik player maupun bot)
        function executeTurn(playerId) {
            if (state.isRolling || state.gameOver) return;

            const player = state.players[playerId];
            if (!player) return;

            state.isRolling = true;
            rollBtn.disabled = true;

            // Animasi dadu
            diceEl.classList.add('rolling');

            // Random dadu
            const diceVal = randomDice();
            state.diceValue = diceVal;

            // Update dadu
            setTimeout(() => {
                diceEl.classList.remove('rolling');
                diceEl.textContent = getDiceEmoji(diceVal);

                // Pindah posisi
                let newPos = player.pos + diceVal;
                if (newPos > MAX_POS) newPos = MAX_POS;
                player.pos = newPos;

                const isBot = player.isBot;
                const nameTag = isBot ?
                    `<span class="bot-log">${player.name}</span>` :
                    `<span class="player-log">${player.name}</span>`;

                // Cek apakah dapat angka 6
                const gotSix = diceVal === 6;
                let extraMsg = '';
                if (gotSix && newPos < MAX_POS) {
                    extraMsg = ' 🎯 <span class="special">BONUS! Main lagi!</span>';
                    state.extraTurn = true;
                } else {
                    state.extraTurn = false;
                }

                addLog(
                    `${nameTag} 🎲 dapat <span class="highlight">${diceVal}</span> → posisi <span class="highlight">${newPos}</span>${extraMsg}`
                );

                // Cek menang
                if (newPos >= MAX_POS) {
                    state.gameOver = true;
                    addLog(`🏆 <span style="color:#ffd700;font-weight:700;">${player.name} MENANG!</span>`);
                    state.isRolling = false;
                    updateUI();
                    return;
                }

                state.isRolling = false;
                updateUI();

                // Jika bot dan dapat 6, jalan lagi (tanpa delay tambahan)
                if (gotSix && newPos < MAX_POS) {
                    if (isBot) {
                        setTimeout(() => {
                            if (!state.gameOver && !state.isRolling) {
                                executeBotTurn(playerId);
                            }
                        }, 500);
                    }
                    // Kalau player dapat 6, tombol aktif dan dia bisa jalan lagi
                } else {
                    // Lanjut ke giliran berikutnya (dengan delay kecil)
                    setTimeout(() => {
                        if (!state.gameOver) {
                            // Reset extraTurn jika tidak dapat 6
                            if (!gotSix) state.extraTurn = false;
                            nextTurn();
                        }
                    }, 400);
                }

            }, 500);
        }

        // Eksekusi giliran bot (dipanggil dari luar)
        function executeBotTurn(botId) {
            // Pastikan yang jalan adalah bot dan gilirannya sesuai
            const currentId = getCurrentPlayerId();
            if (currentId !== botId) {
                // Jika tidak sesuai, paksa pindah ke giliran bot tersebut
                const idx = state.turnOrder.indexOf(botId);
                if (idx !== -1) {
                    state.currentTurnIndex = idx;
                    updateUI();
                } else {
                    return;
                }
            }
            executeTurn(botId);
        }

        // ============================
        // EVENT LISTENER
        // ============================
        rollBtn.addEventListener('click', () => {
            if (state.isRolling || state.gameOver) return;
            const currentId = getCurrentPlayerId();
            if (currentId !== 'player') {
                addLog('⛔ Bukan giliran player!');
                return;
            }
            executeTurn('player');
        });

        resetBtn.addEventListener('click', resetGame);

        // ============================
        // INISIALISASI
        // ============================
        function init() {
            resetGame();
            // Render awal
            renderBotTags();

            // Tambahkan info bot
            addLog('🤖 Bot Alpha, Beta, Gamma siap bertarung!');
            addLog('🎯 Dapat angka 6 = giliran lagi!');
        }

        init();
    </script>
</body>
</html>
